<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Polaroid Studio 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Permanent+Marker&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --accent: #3b82f6;
            --bg: #050505;
            --panel: rgba(15, 15, 18, 0.98);
            --safe-bottom: env(safe-area-inset-bottom, 12px);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
        }

        .viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            position: relative;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        #canvasContainer {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 40px 120px rgba(0,0,0,1);
            background: #fff;
            touch-action: none;
            image-rendering: -webkit-optimize-contrast;
        }

        .controls {
            flex-shrink: 0;
            background: var(--panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            padding-bottom: var(--safe-bottom);
            z-index: 50;
        }

        .tab-bar {
            display: flex;
            padding: 8px 12px;
            gap: 4px;
            justify-content: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .tab-btn {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #555;
            padding: 6px 14px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .tab-btn.active { 
            color: #fff; 
            background: rgba(255,255,255,0.1);
        }

        .settings-pane {
            height: 160px;
            overflow-y: auto;
            padding: 12px 20px;
        }

        .control-group { margin-bottom: 8px; }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%; height: 3px; border-radius: 10px; margin: 10px 0; background: #222;
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 20px; height: 20px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .control-label { display: flex; justify-content: space-between; font-size: 9px; font-weight: 700; color: #777; text-transform: uppercase; }
        .control-val { color: #fff; font-family: 'JetBrains Mono', monospace; }

        .preset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .preset-btn {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            padding: 10px 2px; border-radius: 6px; text-align: center;
            transition: all 0.2s;
        }
        .preset-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
        .preset-btn span { font-size: 8px; font-weight: 800; text-transform: uppercase; display: block;}

        .action-bar {
            padding: 10px 20px;
            display: flex;
            gap: 10px;
        }

        .btn-main {
            background: #fff; color: #000; font-weight: 800; text-transform: uppercase; 
            padding: 12px; border-radius: 10px; font-size: 11px; width: 100%;
            transition: transform 0.1s;
        }
        
        .marker-font { font-family: 'Permanent Marker', cursive; }
        .hidden { display: none !important; }

        .settings-pane::-webkit-scrollbar { width: 3px; }
        .settings-pane::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="viewport">
        <div id="canvasContainer">
            <canvas id="mainCanvas" class="hidden"></canvas>
            
            <div id="emptyState" class="flex flex-col items-center">
                <div class="w-[280px] h-[350px] bg-white rounded-sm p-5 pb-16 shadow-2xl flex flex-col scale-110">
                    <div class="flex-1 bg-zinc-900 flex items-center justify-center rounded-sm overflow-hidden">
                         <label class="cursor-pointer flex flex-col items-center w-full h-full justify-center">
                            <div class="w-14 h-14 bg-white/10 rounded-full flex items-center justify-center mb-3">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
                            </div>
                            <span class="text-[10px] text-white/40 font-black tracking-widest uppercase">Start Project</span>
                            <input type="file" id="imgInput" accept="image/*" class="hidden">
                         </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls" id="controlPanel">
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('format', this)">Format</button>
            <button class="tab-btn" onclick="switchTab('optics', this)">Optics</button>
            <button class="tab-btn" onclick="switchTab('presets', this)">Presets</button>
            <button class="tab-btn" onclick="switchTab('chem', this)">Film</button>
            <button class="tab-btn" onclick="switchTab('style', this)">Text</button>
        </div>

        <div class="settings-pane" id="formatPane">
            <div class="preset-grid">
                <button class="preset-btn active" onclick="setFormat('p600', this)"><span>600</span></button>
                <button class="preset-btn" onclick="setFormat('sx70', this)"><span>SX-70</span></button>
                <button class="preset-btn" onclick="setFormat('spectra', this)"><span>Spectra</span></button>
                <button class="preset-btn" onclick="setFormat('go', this)"><span>Go</span></button>
                <button class="preset-btn" onclick="setFormat('i-type', this)"><span>i-Type</span></button>
                <button class="preset-btn" onclick="setFormat('peel', this)"><span>Pack</span></button>
                <button class="preset-btn" onclick="setFormat('neg35', this)"><span>35mm Neg</span></button>
                <button class="preset-btn" onclick="setFormat('none', this)"><span>Raw</span></button>
            </div>
        </div>

        <div class="settings-pane hidden" id="opticsPane">
            <div class="control-group">
                <div class="control-label"><span>Zoom</span><span class="control-val" id="zoomVal">1.0x</span></div>
                <input type="range" id="zoom" min="0.5" max="4.0" step="0.01" value="1.0">
            </div>
            <div class="control-group">
                <div class="control-label"><span>Rotation</span><span class="control-val" id="rotVal">0°</span></div>
                <input type="range" id="rotation" min="-180" max="180" value="0">
            </div>
        </div>

        <div class="settings-pane hidden" id="presetsPane">
            <div class="preset-grid">
                <button class="preset-btn active" onclick="setPreset('none', this)"><span>None</span></button>
                <button class="preset-btn" onclick="setPreset('bw', this)"><span>B&W</span></button>
                <button class="preset-btn" onclick="setPreset('p68', this)"><span>600s</span></button>
                <button class="preset-btn" onclick="setPreset('vintage', this)"><span>Retro</span></button>
                <button class="preset-btn" onclick="setPreset('sunset', this)"><span>Golden</span></button>
                <button class="preset-btn" onclick="setPreset('cool', this)"><span>Opal</span></button>
                <button class="preset-btn" onclick="setPreset('sepia', this)"><span>Dust</span></button>
                <button class="preset-btn" onclick="setPreset('vivid', this)"><span>High</span></button>
            </div>
        </div>

        <div class="settings-pane hidden" id="chemPane">
            <div class="control-group">
                <div class="control-label"><span>Exposure</span><span class="control-val" id="expVal">100%</span></div>
                <input type="range" id="exposure" min="50" max="150" value="100">
            </div>
            <div class="control-group">
                <div class="control-label"><span>Grain Strength</span><span class="control-val" id="grainVal">30</span></div>
                <input type="range" id="grain" min="0" max="200" value="30">
            </div>
        </div>

        <div class="settings-pane hidden" id="stylePane">
            <input type="text" id="markerText" placeholder="Write on border..." 
                class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 mb-4 text-white marker-font outline-none text-xl text-center">
            <div class="grid grid-cols-2 gap-4">
                <div class="control-group">
                    <div class="control-label"><span>Gloss</span><span class="control-val" id="glossVal">0</span></div>
                    <input type="range" id="gloss" min="0" max="100" value="0">
                </div>
                <div class="control-group">
                    <div class="control-label"><span>Vignette</span><span class="control-val" id="vignetteVal">0</span></div>
                    <input type="range" id="vignette" min="0" max="100" value="0">
                </div>
            </div>
        </div>

        <div class="action-bar">
            <button id="exportBtn" class="btn-main active:scale-95">Develop Photo</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    
    // Format Definitions
    const FORMATS = {
        'p600': { w: 3100, h: 3800, margin: 160, footer: 650, borderRadius: 0 },
        'sx70': { w: 3100, h: 3800, margin: 160, footer: 650, bg: '#fdfdf9' },
        'spectra': { w: 4000, h: 3500, margin: 200, footer: 600 },
        'go': { w: 2400, h: 3000, margin: 120, footer: 500 },
        'i-type': { w: 3100, h: 3800, margin: 160, footer: 650 },
        'peel': { w: 4200, h: 3200, margin: 300, footer: 300, bleed: true },
        'neg35': { w: 3600, h: 2400, margin: 400, footer: 0, isNegative: true },
        'none': { w: 2400, h: 2400, margin: 0, footer: 0 }
    };

    let state = { 
        img: null, x: 0, y: 0, lastX: 0, lastY: 0, 
        isDragging: false, currentPreset: 'none', currentFormat: 'p600' 
    };

    const ui = {};
    const controls = ['zoom', 'rotation', 'exposure', 'grain', 'gloss', 'vignette', 'markerText'];
    
    controls.forEach(id => {
        ui[id] = document.getElementById(id);
        ui[id].oninput = () => { updateLabels(); draw(false); };
    });

    const buffer = document.createElement('canvas');
    const bCtx = buffer.getContext('2d');
    const noiseBuffer = document.createElement('canvas');
    const nCtx = noiseBuffer.getContext('2d');

    function updateNoise() {
        noiseBuffer.width = 512; noiseBuffer.height = 512;
        const idata = nCtx.createImageData(512, 512);
        for(let i=0; i<idata.data.length; i+=4) {
            const v = Math.random() > 0.5 ? (Math.random() * 255) : (Math.random() * 80);
            idata.data[i] = v; idata.data[i+1] = v; idata.data[i+2] = v; idata.data[i+3] = 255;
        }
        nCtx.putImageData(idata, 0, 0);
    }
    updateNoise();

    function updateLabels() {
        document.getElementById('zoomVal').innerText = parseFloat(ui.zoom.value).toFixed(1) + 'x';
        document.getElementById('rotVal').innerText = ui.rotation.value + '°';
        document.getElementById('expVal').innerText = ui.exposure.value + '%';
        document.getElementById('grainVal').innerText = ui.grain.value;
        document.getElementById('vignetteVal').innerText = ui.vignette.value;
        document.getElementById('glossVal').innerText = ui.gloss.value;
    }

    function switchTab(tabId, btn) {
        document.querySelectorAll('.settings-pane').forEach(p => p.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId + 'Pane').classList.remove('hidden');
        btn.classList.add('active');
    }

    function setPreset(pId, btn) {
        state.currentPreset = pId;
        document.querySelectorAll('#presetsPane .preset-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        draw(false);
    }

    function setFormat(fId, btn) {
        state.currentFormat = fId;
        document.querySelectorAll('#formatPane .preset-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        draw(false);
    }

    document.getElementById('imgInput').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (v) => {
            const img = new Image();
            img.onload = () => {
                state.img = img;
                state.x = 0; state.y = 0;
                document.getElementById('emptyState').classList.add('hidden');
                document.getElementById('mainCanvas').classList.remove('hidden');
                draw(true);
            };
            img.src = v.target.result;
        };
        reader.readAsDataURL(file);
    };

    function applyFilmEngine(context, w, h) {
        const exp = parseFloat(ui.exposure.value) / 100;
        const idata = context.getImageData(0, 0, w, h);
        const d = idata.data;
        const preset = state.currentPreset;
        
        for (let i = 0; i < d.length; i += 4) {
            let r = d[i], g = d[i+1], b = d[i+2];

            if(preset === 'bw') {
                const gray = (r * 0.299 + g * 0.587 + b * 0.114);
                r = g = b = Math.max(0, Math.min(255, (gray - 128) * 1.3 + 128));
            } else if (preset === 'p68') {
                r = r * 1.1 + 10; g = g * 0.95; b = b * 0.8;
            } else if (preset === 'vintage') {
                r = r * 0.9 + 40; g = g * 0.8 + 20; b = b * 0.7 + 10;
            } else if (preset === 'sunset') {
                r = r * 1.3 + 20; g = g * 0.9; b = b * 0.6;
            } else if (preset === 'cool') {
                r = r * 0.8; g = g * 1.1; b = b * 1.5 + 10;
            } else if (preset === 'vivid') {
                r = (r - 128) * 1.4 + 128; g = (g - 128) * 1.4 + 128; b = (b - 128) * 1.4 + 128;
            }

            d[i] = Math.max(0, Math.min(255, r * exp));
            d[i+1] = Math.max(0, Math.min(255, g * exp));
            d[i+2] = Math.max(0, Math.min(255, b * exp));
        }
        context.putImageData(idata, 0, 0);
    }

    function drawNegDetails(s, w, h, m) {
        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, w, h);
        
        ctx.fillStyle = "#000";
        // Sprocket Holes
        const holeW = 120 * s, holeH = 180 * s;
        for(let i=0; i<w; i += 300 * s) {
            ctx.fillRect(i + 50*s, 50 * s, holeW, holeH);
            ctx.fillRect(i + 50*s, h - holeH - 50*s, holeW, holeH);
        }

        // Text markings
        ctx.font = `${80 * s}px 'JetBrains Mono'`;
        ctx.fillStyle = "rgba(255, 120, 0, 0.6)"; // Amber kodak color
        ctx.fillText("KODAK PORTRA 400", 400 * s, h - 280 * s);
        ctx.fillText("24A", w - 600 * s, h - 280 * s);
        ctx.fillText("▶ 25", w/2, 280 * s);
    }

    function draw(highRes = false) {
        if(!state.img) return;
        const fmt = FORMATS[state.currentFormat];
        const containerW = document.getElementById('canvasContainer').clientWidth;
        const containerH = document.getElementById('canvasContainer').clientHeight;

        const scaleX = containerW / fmt.w;
        const scaleY = containerH / fmt.h;
        const s = highRes ? 1 : Math.min(scaleX, scaleY);
        
        canvas.width = fmt.w * s;
        canvas.height = fmt.h * s;

        const m = fmt.margin * s;
        const footerH = fmt.footer * s;
        const photoW = canvas.width - (m * 2);
        const photoH = canvas.height - (m * 2) - footerH;

        // Background
        if(fmt.isNegative) {
            drawNegDetails(s, canvas.width, canvas.height, m);
        } else {
            ctx.fillStyle = fmt.bg || "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Buffer Drawing
        buffer.width = photoW / s;
        buffer.height = photoH / s;
        const bW = buffer.width, bH = buffer.height;
        
        const z = parseFloat(ui.zoom.value);
        const r = parseInt(ui.rotation.value) * Math.PI / 180;
        const aspect = state.img.width / state.img.height;
        const pAspect = bW / bH;

        let dw, dh;
        if (aspect > pAspect) {
            dh = bH * z; dw = dh * aspect;
        } else {
            dw = bW * z; dh = dw / aspect;
        }

        bCtx.fillStyle = "#111";
        bCtx.fillRect(0, 0, bW, bH);
        bCtx.save();
        bCtx.translate(bW/2 + state.x * s, bH/2 + state.y * s);
        bCtx.rotate(r);
        bCtx.drawImage(state.img, -dw/2, -dh/2, dw, dh);
        bCtx.restore();
        applyFilmEngine(bCtx, bW, bH);

        // Render Photo to Main
        ctx.save();
        ctx.drawImage(buffer, m, m, photoW, photoH);

        // Overlays
        const gVal = parseInt(ui.grain.value);
        if(gVal > 0) {
            ctx.save();
            ctx.globalCompositeOperation = 'overlay';
            ctx.globalAlpha = gVal / 255;
            const ptrn = ctx.createPattern(noiseBuffer, 'repeat');
            ctx.fillStyle = ptrn;
            ctx.translate(m, m);
            ctx.fillRect(0, 0, photoW, photoH);
            ctx.restore();
        }

        const vVal = parseInt(ui.vignette.value);
        if(vVal > 0) {
            const grad = ctx.createRadialGradient(m+photoW/2, m+photoH/2, photoW*0.3, m+photoW/2, m+photoH/2, photoW*0.8);
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(1, `rgba(0,0,0,${vVal/100 * 0.8})`);
            ctx.fillStyle = grad;
            ctx.fillRect(m, m, photoW, photoH);
        }

        const glossVal = parseInt(ui.gloss.value);
        if(glossVal > 0) {
            ctx.save();
            const alpha = (glossVal / 100);
            const grad = ctx.createLinearGradient(m, m, m+photoW, m+photoH);
            grad.addColorStop(0, `rgba(255,255,255,${0.2 * alpha})`);
            grad.addColorStop(0.5, `rgba(255,255,255,0)`);
            grad.addColorStop(1, `rgba(255,255,255,${0.1 * alpha})`);
            ctx.fillStyle = grad;
            ctx.fillRect(m, m, photoW, photoH);
            ctx.restore();
        }
        ctx.restore();

        // Footer Text
        if(ui.markerText.value && footerH > 0) {
            ctx.font = `${140 * s}px 'Permanent Marker'`;
            ctx.fillStyle = "rgba(10,10,25,0.85)";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.save();
            const footerCenterY = (canvas.height - footerH) + (footerH / 2) + (30 * s);
            ctx.translate(canvas.width/2, footerCenterY);
            ctx.rotate(-0.015);
            ctx.fillText(ui.markerText.value, 0, 0);
            ctx.restore();
        }

        if(!highRes) {
            clearTimeout(window.rTimer);
            window.rTimer = setTimeout(() => draw(true), 300);
        }
    }

    const container = document.getElementById('canvasContainer');
    const handleMove = (e) => {
        if(!state.isDragging || !state.img) return;
        const t = e.touches ? e.touches[0] : e;
        const fmt = FORMATS[state.currentFormat];
        const f = fmt.w / canvas.clientWidth;
        state.x += (t.clientX - state.lastX) * f;
        state.y += (t.clientY - state.lastY) * f;
        state.lastX = t.clientX; state.lastY = t.clientY;
        draw(false);
    };

    container.addEventListener('mousedown', (e) => { state.isDragging = true; state.lastX = e.clientX; state.lastY = e.clientY; });
    container.addEventListener('touchstart', (e) => { state.isDragging = true; state.lastX = e.touches[0].clientX; state.lastY = e.touches[0].clientY; }, {passive: false});
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', (e) => { if(state.isDragging) e.preventDefault(); handleMove(e); }, {passive: false});
    window.addEventListener('mouseup', () => state.isDragging = false);
    window.addEventListener('touchend', () => state.isDragging = false);

    document.getElementById('exportBtn').onclick = function() {
        if(!state.img) return;
        draw(true);
        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/jpeg', 0.98);
        link.download = `studio_${state.currentFormat}_${Date.now()}.jpg`;
        link.click();
    };

    window.onresize = () => draw(false);
    updateLabels();
</script>
</body>
</html>
