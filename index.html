<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Polaroid Studio 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Permanent+Marker&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --accent: #3b82f6;
            --bg: #0a0a0c;
            --panel: rgba(20, 20, 25, 0.95);
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
        }

        /* Responsive Viewport */
        .viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #canvasContainer {
            transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* Controls Panel */
        .controls {
            flex-shrink: 0;
            height: 38dvh;
            min-height: 320px;
            background: var(--panel);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255,255,255,0.08);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            display: flex;
            flex-direction: column;
            padding-bottom: var(--safe-bottom);
            z-index: 50;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
        }

        /* Focus Mode States */
        body.is-adjusting .controls {
            transform: translateY(85%);
            opacity: 0.4;
            pointer-events: none; /* Allow interaction with the slider currently held, but hide the rest */
        }
        
        /* Ensure the slider being touched remains interactive even if parent is "ghosted" */
        body.is-adjusting input[type=range]:active {
            pointer-events: auto;
        }

        body.is-adjusting #canvasContainer {
            transform: scale(1.25) translateY(10%);
        }

        canvas {
            max-width: 95%;
            max-height: 95%;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
            background: #fff;
            touch-action: none;
            border-radius: 1px;
        }

        .tab-bar {
            display: flex;
            padding: 12px 20px;
            gap: 8px;
            justify-content: space-between;
        }

        .tab-btn {
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            padding: 8px 12px;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .tab-btn.active { 
            color: #fff; 
            background: rgba(255,255,255,0.05);
        }

        .settings-pane {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px 10px;
        }

        .control-group { margin-bottom: 12px; }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%; height: 4px; border-radius: 10px; margin: 12px 0; background: #2a2a30;
            cursor: pointer;
            pointer-events: auto !important; /* Always clickable */
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 24px; height: 24px; background: #fff; border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .control-label { display: flex; justify-content: space-between; font-size: 9px; font-weight: 700; color: #888; text-transform: uppercase; }
        .control-val { color: #fff; font-family: 'JetBrains Mono', monospace; }

        .preset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; }
        .preset-btn {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            padding: 10px 4px; border-radius: 8px; text-align: center; transition: all 0.2s;
        }
        .preset-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
        .preset-btn span { font-size: 7px; font-weight: 800; text-transform: uppercase; }

        .btn-main {
            background: #fff; color: #000; font-weight: 800; text-transform: uppercase; 
            padding: 14px; border-radius: 14px; font-size: 12px; width: 100%;
        }
        .marker-font { font-family: 'Permanent Marker', cursive; }
        .hidden { display: none !important; }

        /* Custom Scrollbar */
        .settings-pane::-webkit-scrollbar { width: 4px; }
        .settings-pane::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="viewport" id="viewport">
        <div id="canvasContainer">
            <canvas id="mainCanvas" class="hidden"></canvas>
            
            <div id="emptyState" class="flex flex-col items-center">
                <div class="w-[240px] h-[300px] bg-white rounded-sm p-4 pb-12 shadow-2xl flex flex-col">
                    <div class="flex-1 bg-zinc-900 flex items-center justify-center rounded-sm overflow-hidden group">
                         <label class="cursor-pointer flex flex-col items-center">
                            <div class="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center mb-2">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
                            </div>
                            <span class="text-[8px] text-white/40 font-black tracking-widest uppercase">Open Studio</span>
                            <input type="file" id="imgInput" accept="image/*" class="hidden">
                         </label>
                    </div>
                </div>
            </div>
        </div>

        <button onclick="showPreview()" id="inspectBtn" class="absolute top-6 right-6 w-10 h-10 bg-white/10 backdrop-blur-xl border border-white/10 rounded-full flex items-center justify-center hidden">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
        </button>
    </div>

    <div class="controls" id="controlPanel">
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('optics', this)">Optics</button>
            <button class="tab-btn" onclick="switchTab('presets', this)">Presets</button>
            <button class="tab-btn" onclick="switchTab('color', this)">Chemicals</button>
            <button class="tab-btn" onclick="switchTab('finish', this)">Finish</button>
        </div>

        <div class="settings-pane" id="opticsPane">
            <div class="control-group">
                <div class="control-label"><span>Zoom</span><span class="control-val" id="zoomVal">1.0x</span></div>
                <input type="range" id="zoom" min="0.5" max="3.5" step="0.01" value="1.0">
            </div>
            <div class="control-group">
                <div class="control-label"><span>Rotation</span><span class="control-val" id="rotVal">0°</span></div>
                <input type="range" id="rotation" min="-180" max="180" value="0">
            </div>
        </div>

        <div class="settings-pane hidden" id="presetsPane">
            <div class="preset-grid">
                <button class="preset-btn active" onclick="setPreset('none', this)"><span>None</span></button>
                <button class="preset-btn" onclick="setPreset('bw', this)"><span>B&W</span></button>
                <button class="preset-btn" onclick="setPreset('p68', this)"><span>'68</span></button>
                <button class="preset-btn" onclick="setPreset('vintage', this)"><span>Old</span></button>
                <button class="preset-btn" onclick="setPreset('sunset', this)"><span>Sun</span></button>
                <button class="preset-btn" onclick="setPreset('cool', this)"><span>Cyan</span></button>
                <button class="preset-btn" onclick="setPreset('sepia', this)"><span>Sepia</span></button>
            </div>
        </div>

        <div class="settings-pane hidden" id="colorPane">
            <div class="grid grid-cols-1 gap-2">
                <div class="control-group">
                    <div class="control-label"><span>Exposure</span><span class="control-val" id="expVal">100%</span></div>
                    <input type="range" id="exposure" min="40" max="180" value="100">
                </div>
                <div class="control-group">
                    <div class="control-label"><span>B&W Fine</span><span class="control-val" id="bwFineVal">1.0</span></div>
                    <input type="range" id="bwFine" min="0.1" max="2.0" step="0.01" value="1.0">
                </div>
                <div class="grid grid-cols-1 gap-0">
                   <input type="range" id="rRange" min="0.5" max="1.5" step="0.01" value="1.0" class="!my-1">
                   <input type="range" id="gRange" min="0.5" max="1.5" step="0.01" value="1.0" class="!my-1">
                   <input type="range" id="bRange" min="0.5" max="1.5" step="0.01" value="1.0" class="!my-1">
                </div>
            </div>
        </div>

        <div class="settings-pane hidden" id="finishPane">
            <div class="control-group">
                <div class="control-label"><span>Film Grain</span><span class="control-val" id="grainVal">30</span></div>
                <input type="range" id="grain" min="0" max="200" value="30">
            </div>
            <input type="text" id="markerText" placeholder="Marker text..." 
                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mb-3 text-white marker-font outline-none text-lg text-center">
            <div class="grid grid-cols-2 gap-4">
                <div class="control-group">
                    <div class="control-label"><span>Gloss</span><span class="control-val" id="glossVal">0</span></div>
                    <input type="range" id="gloss" min="0" max="150" value="0">
                </div>
                <div class="control-group">
                    <div class="control-label"><span>Vignette</span><span class="control-val" id="vignetteVal">0</span></div>
                    <input type="range" id="vignette" min="0" max="100" value="0">
                </div>
            </div>
        </div>

        <div class="px-5 py-3 flex gap-3 mt-auto bg-black/40">
            <button id="exportBtn" class="btn-main active:scale-[0.98]">Develop Photo</button>
        </div>
    </div>

    <div id="previewOverlay" class="fixed inset-0 bg-black/95 z-[1000] hidden flex-col items-center justify-center p-6" onclick="hidePreview()">
        <img id="previewImg" class="max-w-full max-h-[85vh] shadow-2xl" src="" alt="Final">
        <p class="mt-6 text-white/40 text-[10px] font-bold uppercase tracking-[0.3em]">Tap to exit</p>
    </div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const BASE_S = 2400, MARGIN = 160, FOOTER = 600;
    const TOTAL_W = BASE_S + (MARGIN * 2), TOTAL_H = BASE_S + MARGIN + FOOTER;

    const buffer = document.createElement('canvas');
    const bCtx = buffer.getContext('2d');
    
    const noiseBuffer = document.createElement('canvas');
    const nCtx = noiseBuffer.getContext('2d');
    function updateNoise() {
        noiseBuffer.width = 512; noiseBuffer.height = 512;
        const idata = nCtx.createImageData(512, 512);
        for(let i=0; i<idata.data.length; i+=4) {
            const v = Math.random() > 0.5 ? (Math.random() * 255) : (Math.random() * 80);
            idata.data[i] = v; idata.data[i+1] = v; idata.data[i+2] = v; idata.data[i+3] = 255;
        }
        nCtx.putImageData(idata, 0, 0);
    }
    updateNoise();

    let state = { img: null, x: 0, y: 0, lastX: 0, lastY: 0, isDragging: false, currentPreset: 'none' };

    const ui = {};
    const controls = ['zoom', 'rotation', 'exposure', 'bwFine', 'rRange', 'gRange', 'bRange', 'grain', 'gloss', 'vignette', 'markerText'];
    
    controls.forEach(id => {
        ui[id] = document.getElementById(id);
        if (!ui[id]) return;

        // Focus Mode Trigger
        const startAdjust = () => { if(state.img) document.body.classList.add('is-adjusting'); };
        const endAdjust = () => document.body.classList.remove('is-adjusting');

        ui[id].addEventListener('touchstart', startAdjust);
        ui[id].addEventListener('mousedown', startAdjust);
        ui[id].addEventListener('touchend', endAdjust);
        ui[id].addEventListener('mouseup', endAdjust);

        ui[id].oninput = () => { updateLabels(); draw(false); };
    });

    function updateLabels() {
        if(document.getElementById('zoomVal')) document.getElementById('zoomVal').innerText = parseFloat(ui.zoom.value).toFixed(1) + 'x';
        if(document.getElementById('rotVal')) document.getElementById('rotVal').innerText = ui.rotation.value + '°';
        if(document.getElementById('expVal')) document.getElementById('expVal').innerText = ui.exposure.value + '%';
        if(document.getElementById('bwFineVal')) document.getElementById('bwFineVal').innerText = ui.bwFine.value;
        if(document.getElementById('grainVal')) document.getElementById('grainVal').innerText = ui.grain.value;
        if(document.getElementById('vignetteVal')) document.getElementById('vignetteVal').innerText = ui.vignette.value;
        if(document.getElementById('glossVal')) document.getElementById('glossVal').innerText = ui.gloss.value;
    }

    function switchTab(tabId, btn) {
        document.querySelectorAll('.settings-pane').forEach(p => p.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId + 'Pane').classList.remove('hidden');
        btn.classList.add('active');
    }

    function setPreset(pId, btn) {
        state.currentPreset = pId;
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        draw(false);
    }

    const handleImageLoad = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (v) => {
            const img = new Image();
            img.onload = () => {
                state.img = img;
                state.x = 0; state.y = 0;
                document.getElementById('emptyState').classList.add('hidden');
                document.getElementById('mainCanvas').classList.remove('hidden');
                document.getElementById('inspectBtn').classList.remove('hidden');
                draw(true);
            };
            img.src = v.target.result;
        };
        reader.readAsDataURL(file);
    };

    document.getElementById('imgInput').onchange = handleImageLoad;

    function applyFilmEngine(context, w, h) {
        const exp = parseFloat(ui.exposure.value) / 100;
        const bwF = parseFloat(ui.bwFine.value);
        const rMult = parseFloat(ui.rRange.value);
        const gMult = parseFloat(ui.gRange.value);
        const bMult = parseFloat(ui.bRange.value);
        
        const idata = context.getImageData(0, 0, w, h);
        const d = idata.data;
        const preset = state.currentPreset;
        
        for (let i = 0; i < d.length; i += 4) {
            let r = d[i], g = d[i+1], b = d[i+2];

            if(preset === 'bw') {
                const gray = (r * 0.299 + g * 0.587 + b * 0.114) * bwF;
                r = g = b = Math.max(0, Math.min(255, (gray - 128) * 1.2 + 128));
            } else if (preset === 'p68') {
                r = r * 1.1 + 10; g = g * 0.95; b = b * 0.85;
            } else if (preset === 'vintage') {
                r = r * 0.9 + 40; g = g * 0.8 + 30; b = b * 0.7 + 20;
            } else if (preset === 'sunset') {
                r = r * 1.3 + 10; g = g * 1.0; b = b * 0.7;
            } else if (preset === 'cool') {
                r = r * 0.8; g = g * 1.1; b = b * 1.4 + 10;
            } else if (preset === 'sepia') {
                const gray = (r * 0.3 + g * 0.59 + b * 0.11);
                r = gray + 80; g = gray + 45; b = gray + 10;
            }

            if(preset !== 'bw' && bwF !== 1.0) {
                r *= bwF; g *= bwF; b *= bwF;
            }

            d[i] = Math.max(0, Math.min(255, r * exp * rMult));
            d[i+1] = Math.max(0, Math.min(255, g * exp * gMult));
            d[i+2] = Math.max(0, Math.min(255, b * exp * bMult));
        }
        context.putImageData(idata, 0, 0);
    }

    function draw(highRes = false) {
        if(!state.img) return;
        const s = highRes ? 1 : (Math.min(window.innerWidth * 2, 1000) / TOTAL_W);
        canvas.width = TOTAL_W * s; canvas.height = TOTAL_H * s;
        
        ctx.fillStyle = "#ffffff"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const m = MARGIN * s, b = BASE_S * s, z = parseFloat(ui.zoom.value);
        const r = parseInt(ui.rotation.value) * Math.PI / 180;
        const aspect = state.img.width / state.img.height;
        let dw = aspect > 1 ? (b * z * aspect) : (b * z), dh = aspect > 1 ? (b * z) : (b * z / aspect);

        buffer.width = b; buffer.height = b;
        bCtx.fillStyle = "#111"; bCtx.fillRect(0, 0, b, b);
        bCtx.save();
        bCtx.translate(b/2 + state.x * s, b/2 + state.y * s);
        bCtx.rotate(r);
        bCtx.drawImage(state.img, -dw/2, -dh/2, dw, dh);
        bCtx.restore();
        applyFilmEngine(bCtx, b, b);

        ctx.save();
        ctx.beginPath(); ctx.rect(m, m, b, b); ctx.clip();
        ctx.drawImage(buffer, m, m);

        const gVal = parseInt(ui.grain.value);
        if(gVal > 0) {
            ctx.save();
            ctx.globalCompositeOperation = 'overlay';
            ctx.globalAlpha = gVal / 255;
            const ptrn = ctx.createPattern(noiseBuffer, 'repeat');
            ctx.fillStyle = ptrn;
            ctx.fillRect(m, m, b, b);
            ctx.restore();
        }

        const vVal = parseInt(ui.vignette.value);
        if(vVal > 0) {
            const grad = ctx.createRadialGradient(m+b/2, m+b/2, b*0.3, m+b/2, m+b/2, b*0.75);
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(1, `rgba(0,0,0,${vVal/100 * 0.9})`);
            ctx.fillStyle = grad;
            ctx.fillRect(m, m, b, b);
        }

        const glossVal = parseInt(ui.gloss.value);
        if(glossVal > 0) {
            ctx.save();
            const alpha = (glossVal / 100);
            const grad = ctx.createLinearGradient(m, m, m+b, m+b);
            grad.addColorStop(0, `rgba(255,255,255,${0.25 * alpha})`);
            grad.addColorStop(0.5, `rgba(255,255,255,0)`);
            grad.addColorStop(1, `rgba(255,255,255,${0.1 * alpha})`);
            ctx.fillStyle = grad;
            ctx.fillRect(m, m, b, b);
            ctx.restore();
        }
        ctx.restore(); 

        if(ui.markerText.value) {
            ctx.font = `${120 * s}px 'Permanent Marker'`;
            ctx.fillStyle = "rgba(20,20,40,0.8)";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.save();
            const footerCenterY = (TOTAL_H * s - FOOTER * s) + (FOOTER * s / 2) + (20 * s);
            ctx.translate(canvas.width/2, footerCenterY);
            ctx.rotate(-0.01);
            ctx.fillText(ui.markerText.value, 0, 0);
            ctx.restore();
        }

        if(!highRes) {
            clearTimeout(window.rTimer);
            window.rTimer = setTimeout(() => draw(true), 400);
        }
    }

    const viewportEl = document.getElementById('viewport');
    const handleMove = (e) => {
        if(!state.isDragging || !state.img) return;
        const t = e.touches ? e.touches[0] : e;
        const f = TOTAL_W / canvas.clientWidth;
        state.x += (t.clientX - state.lastX) * f;
        state.y += (t.clientY - state.lastY) * f;
        state.lastX = t.clientX; state.lastY = t.clientY;
        draw(false);
    };

    viewportEl.addEventListener('mousedown', (e) => { state.isDragging = true; state.lastX = e.clientX; state.lastY = e.clientY; });
    viewportEl.addEventListener('touchstart', (e) => { state.isDragging = true; state.lastX = e.touches[0].clientX; state.lastY = e.touches[0].clientY; }, {passive: false});
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', (e) => { if(state.isDragging) e.preventDefault(); handleMove(e); }, {passive: false});
    window.addEventListener('mouseup', () => state.isDragging = false);
    window.addEventListener('touchend', () => state.isDragging = false);

    function showPreview() {
        if(!state.img) return;
        draw(true);
        document.getElementById('previewImg').src = canvas.toDataURL('image/jpeg', 0.9);
        document.getElementById('previewOverlay').classList.remove('hidden');
    }
    function hidePreview() { document.getElementById('previewOverlay').classList.add('hidden'); }

    document.getElementById('exportBtn').onclick = function() {
        if(!state.img) return;
        this.innerText = "PREPARING...";
        setTimeout(() => {
            draw(true);
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/jpeg', 0.95);
            link.download = `polaroid_${Date.now()}.jpg`;
            link.click();
            this.innerText = "Develop Photo";
            showPreview();
        }, 50);
    };

    updateLabels();
</script>
</body>
</html>
